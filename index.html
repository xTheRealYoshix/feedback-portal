<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Feedback Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e8ecf1 100%); min-height: 100vh; }
  ::selection { background: #1e293b; color: #fff; }
  input:focus, textarea:focus { outline: none; border-color: #1e293b !important; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-in { animation: fadeUp 0.45s ease both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── Storage ── */
const DB = {
get(k, fallback) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.error(e); } },
};

const DEFAULTS = {
questions: [
{ id: “q1”, text: “How would you rate the overall quality of service?”, category: “Service” },
{ id: “q2”, text: “How responsive was our team to your needs?”, category: “Service” },
{ id: “q3”, text: “How would you rate the value for money?”, category: “Value” },
{ id: “q4”, text: “How likely are you to recommend us to others?”, category: “Loyalty” },
],
settings: {
title: “Feedback Portal”,
subtitle: “We value your honest feedback. It helps us improve.”,
adminPass: “admin123”,
thankYouMessage: “Your feedback has been recorded and will be reviewed by our team.”,
},
};

/* ── Tiny Components ── */
function RatingScale({ value, onChange }) {
const color = (n) => {
if (n <= 2) return { active: “#ef4444”, hover: “#fee2e2” };
if (n <= 4) return { active: “#f97316”, hover: “#ffedd5” };
if (n <= 6) return { active: “#eab308”, hover: “#fef9c3” };
if (n <= 8) return { active: “#22c55e”, hover: “#dcfce7” };
return { active: “#10b981”, hover: “#d1fae5” };
};
return (
<div style={{ display: “flex”, gap: 5, alignItems: “center”, flexWrap: “wrap” }}>
<span style={{ fontSize: 10, color: “#94a3b8”, minWidth: 30 }}>Worst</span>
{Array.from({ length: 11 }, (_, i) => {
const c = color(i); const sel = value === i;
return (
<button key={i} onClick={() => onChange(i)} style={{
width: 34, height: 34, borderRadius: 8,
border: `2px solid ${sel ? c.active : "#e2e8f0"}`,
background: sel ? c.active : “#fff”,
color: sel ? “#fff” : “#64748b”,
fontWeight: 600, fontSize: 13, cursor: “pointer”,
transition: “all 0.2s”, fontFamily: “‘DM Sans’,sans-serif”,
transform: sel ? “scale(1.12)” : “scale(1)”,
boxShadow: sel ? `0 2px 8px ${c.active}44` : “none”,
}}>{i}</button>
);
})}
<span style={{ fontSize: 10, color: “#94a3b8” }}>Best</span>
</div>
);
}

function Progress({ step, total }) {
return (
<div style={{ display: “flex”, gap: 6, marginBottom: 28 }}>
{Array.from({ length: total }, (_, i) => (
<div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= step ? “#1e293b” : “#e2e8f0”, transition: “background 0.4s” }} />
))}
</div>
);
}

function Field({ label, value, onChange, type = “text”, placeholder, error }) {
return (
<div style={{ marginBottom: 18 }}>
<label style={{ display: “block”, fontSize: 13, fontWeight: 600, color: “#334155”, marginBottom: 5 }}>{label}</label>
<input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
style={{ width: “100%”, padding: “11px 14px”, borderRadius: 10, border: `1.5px solid ${error ? "#ef4444" : "#e2e8f0"}`, fontSize: 15, fontFamily: “‘DM Sans’,sans-serif”, background: “#f8fafc”, transition: “border 0.2s” }} />
{error && <span style={{ fontSize: 12, color: “#ef4444”, marginTop: 3, display: “block” }}>{error}</span>}
</div>
);
}

/* ── Main App ── */
function App() {
const [view, setView] = useState(“landing”);
const [questions, setQuestions] = useState(() => DB.get(“fb_questions”, DEFAULTS.questions));
const [submissions, setSubs] = useState(() => DB.get(“fb_submissions”, []));
const [settings, setSettings] = useState(() => DB.get(“fb_settings”, DEFAULTS.settings));

const [firstName, setFirst] = useState(””);
const [surname, setSurname] = useState(””);
const [email, setEmail] = useState(””);
const [ratings, setRatings] = useState({});
const [freeText, setFreeText] = useState(””);
const [errors, setErrors] = useState({});

const [adminAuth, setAuth] = useState(false);
const [adminPass, setAdminPass] = useState(””);
const [adminTab, setAdminTab] = useState(“dashboard”);
const [editQ, setEditQ] = useState(null);
const [newQ, setNewQ] = useState({ text: “”, category: “” });
const [selectedSub, setSelectedSub] = useState(null);
const [settingsForm, setSettingsForm] = useState(settings);
const [toast, setToast] = useState(””);

const saveQ = (q) => { setQuestions(q); DB.set(“fb_questions”, q); };
const saveS = (s) => { setSubs(s); DB.set(“fb_submissions”, s); };
const saveSt = (s) => { setSettings(s); DB.set(“fb_settings”, s); };

const flash = (msg) => { setToast(msg); setTimeout(() => setToast(””), 2200); };
const resetForm = () => { setFirst(””); setSurname(””); setEmail(””); setRatings({}); setFreeText(””); setErrors({}); };

const card = { background: “#fff”, borderRadius: 16, padding: “28px 22px”, boxShadow: “0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04)”, maxWidth: 620, width: “100%”, margin: “0 auto” };
const btn = (primary, extra) => ({
padding: “11px 24px”, borderRadius: 10, border: “none”, fontWeight: 600, fontSize: 14, cursor: “pointer”, fontFamily: “‘DM Sans’,sans-serif”,
background: primary ? “#1e293b” : “#f1f5f9”, color: primary ? “#fff” : “#475569”, transition: “all 0.2s”, display: “inline-flex”, alignItems: “center”, gap: 6, …extra,
});
const pill = (active) => ({
padding: “8px 14px”, borderRadius: 8, border: “none”, fontWeight: 500, fontSize: 13, cursor: “pointer”, fontFamily: “‘DM Sans’,sans-serif”,
background: active ? “#1e293b” : “transparent”, color: active ? “#fff” : “#64748b”, transition: “all 0.2s”,
});

const wrap = (children) => (
<div style={{ minHeight: “100vh”, padding: “24px 14px” }}>
<div className=“animate-in” style={{ maxWidth: 660, margin: “0 auto” }}>{children}</div>
{toast && <div style={{ position: “fixed”, bottom: 20, left: “50%”, transform: “translateX(-50%)”, background: “#1e293b”, color: “#fff”, padding: “10px 22px”, borderRadius: 10, fontSize: 13, fontWeight: 500, zIndex: 999, animation: “fadeUp 0.3s ease” }}>{toast}</div>}
</div>
);

/* ── Landing ── */
if (view === “landing”) return wrap(
<div style={{ textAlign: “center”, paddingTop: 56 }}>
<div style={{ width: 52, height: 52, borderRadius: 14, background: “#1e293b”, display: “flex”, alignItems: “center”, justifyContent: “center”, margin: “0 auto 22px” }}>
<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</div>
<h1 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 30, fontWeight: 700, color: “#0f172a”, marginBottom: 10, lineHeight: 1.2 }}>{settings.title}</h1>
<p style={{ color: “#64748b”, fontSize: 15, maxWidth: 400, margin: “0 auto 32px”, lineHeight: 1.6 }}>{settings.subtitle}</p>
<button style={btn(true)} onClick={() => { resetForm(); setView(“step1”); }}>Begin Feedback →</button>
<p style={{ marginTop: 44, fontSize: 12, color: “#94a3b8” }}>
<span style={{ cursor: “pointer”, textDecoration: “underline” }} onClick={() => setView(“admin”)}>Admin Access</span>
</p>
</div>
);

/* ── Step 1 ── */
if (view === “step1”) return wrap(
<div style={card}>
<Progress step={0} total={3} />
<p style={{ fontSize: 11, fontWeight: 600, color: “#94a3b8”, textTransform: “uppercase”, letterSpacing: 1, marginBottom: 4 }}>Step 1 of 3</p>
<h2 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 22, color: “#0f172a”, marginBottom: 22 }}>Your Details</h2>
<Field label="First Name" value={firstName} onChange={setFirst} placeholder="Jane" error={errors.firstName} />
<Field label="Surname" value={surname} onChange={setSurname} placeholder="Smith" error={errors.surname} />
<Field label="Email Address" value={email} onChange={setEmail} type="email" placeholder="jane@example.com" error={errors.email} />
<div style={{ display: “flex”, justifyContent: “space-between”, marginTop: 8 }}>
<button style={btn(false)} onClick={() => setView(“landing”)}>← Back</button>
<button style={btn(true)} onClick={() => {
const e = {};
if (!firstName.trim()) e.firstName = “Required”;
if (!surname.trim()) e.surname = “Required”;
if (!email.trim()) e.email = “Required”;
else if (!/^[^\s@]+@[^\s@]+.[^\s@]+$/.test(email)) e.email = “Invalid email”;
setErrors(e);
if (!Object.keys(e).length) setView(“step2”);
}}>Continue →</button>
</div>
</div>
);

/* ── Step 2 ── */
if (view === “step2”) return wrap(
<div style={card}>
<Progress step={1} total={3} />
<p style={{ fontSize: 11, fontWeight: 600, color: “#94a3b8”, textTransform: “uppercase”, letterSpacing: 1, marginBottom: 4 }}>Step 2 of 3</p>
<h2 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 22, color: “#0f172a”, marginBottom: 6 }}>Rate Your Experience</h2>
<p style={{ fontSize: 13, color: “#94a3b8”, marginBottom: 24 }}>0 = worst · 10 = best</p>
{errors.ratings && <div style={{ background: “#fef2f2”, color: “#dc2626”, padding: “10px 14px”, borderRadius: 8, fontSize: 13, marginBottom: 14 }}>{errors.ratings}</div>}
{questions.map((q, i) => (
<div key={q.id} style={{ marginBottom: 24, paddingBottom: 24, borderBottom: i < questions.length - 1 ? “1px solid #f1f5f9” : “none” }}>
<div style={{ display: “flex”, gap: 6, marginBottom: 8 }}>
<span style={{ fontSize: 12, fontWeight: 700, color: “#94a3b8”, minWidth: 16 }}>{i + 1}.</span>
<span style={{ fontSize: 14, fontWeight: 500, color: “#1e293b”, lineHeight: 1.4 }}>{q.text}</span>
</div>
{q.category && <span style={{ fontSize: 10, background: “#f1f5f9”, color: “#64748b”, padding: “2px 7px”, borderRadius: 4, marginLeft: 22, marginBottom: 6, display: “inline-block” }}>{q.category}</span>}
<div style={{ marginLeft: 22, marginTop: 6 }}><RatingScale value={ratings[q.id]} onChange={v => setRatings({ …ratings, [q.id]: v })} /></div>
</div>
))}
<div style={{ display: “flex”, justifyContent: “space-between”, marginTop: 8 }}>
<button style={btn(false)} onClick={() => setView(“step1”)}>← Back</button>
<button style={btn(true)} onClick={() => {
const unanswered = questions.filter(q => ratings[q.id] === undefined).length;
if (unanswered > 0) { setErrors({ ratings: `Please rate all ${unanswered} remaining question(s)` }); return; }
setErrors({}); setView(“step3”);
}}>Continue →</button>
</div>
</div>
);

/* ── Step 3 ── */
if (view === “step3”) {
const avg = (Object.values(ratings).reduce((a, b) => a + b, 0) / Math.max(Object.values(ratings).length, 1)).toFixed(1);
return wrap(
<div style={card}>
<Progress step={2} total={3} />
<p style={{ fontSize: 11, fontWeight: 600, color: “#94a3b8”, textTransform: “uppercase”, letterSpacing: 1, marginBottom: 4 }}>Step 3 of 3</p>
<h2 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 22, color: “#0f172a”, marginBottom: 6 }}>Additional Comments</h2>
<p style={{ fontSize: 13, color: “#94a3b8”, marginBottom: 18 }}>Anything else you’d like us to know? (Optional)</p>
<textarea value={freeText} onChange={e => setFreeText(e.target.value)} placeholder=“Share any additional thoughts, suggestions, or feedback…”
rows={5} style={{ width: “100%”, padding: “12px”, borderRadius: 10, border: “1.5px solid #e2e8f0”, fontSize: 14, fontFamily: “‘DM Sans’,sans-serif”, resize: “vertical”, background: “#f8fafc”, lineHeight: 1.6 }} />
<div style={{ background: “#f8fafc”, borderRadius: 10, padding: 14, marginTop: 18, border: “1px solid #e2e8f0” }}>
<p style={{ fontSize: 11, fontWeight: 600, color: “#475569”, marginBottom: 6 }}>Review Summary</p>
<p style={{ fontSize: 13, color: “#64748b” }}>{firstName} {surname} · {email}</p>
<p style={{ fontSize: 13, color: “#64748b”, marginTop: 3 }}>{Object.keys(ratings).length} questions rated · Avg: {avg}/10</p>
</div>
<div style={{ display: “flex”, justifyContent: “space-between”, marginTop: 22 }}>
<button style={btn(false)} onClick={() => setView(“step2”)}>← Back</button>
<button style={btn(true, { background: “#059669” })} onClick={() => {
const sub = { id: “s” + Date.now(), firstName: firstName.trim(), surname: surname.trim(), email: email.trim(), ratings: { …ratings }, freeText: freeText.trim(), timestamp: new Date().toISOString(), questionSnapshot: questions.map(q => ({ id: q.id, text: q.text, category: q.category })) };
saveS([sub, …submissions]); setView(“thankyou”);
}}>Submit Feedback ✓</button>
</div>
</div>
);
}

/* ── Thank You ── */
if (view === “thankyou”) return wrap(
<div style={{ …card, textAlign: “center”, padding: “44px 22px” }}>
<div style={{ width: 60, height: 60, borderRadius: “50%”, background: “#d1fae5”, display: “flex”, alignItems: “center”, justifyContent: “center”, margin: “0 auto 18px”, fontSize: 26 }}>✓</div>
<h2 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 24, color: “#0f172a”, marginBottom: 10 }}>Thank You!</h2>
<p style={{ color: “#64748b”, fontSize: 14, maxWidth: 360, margin: “0 auto 28px”, lineHeight: 1.6 }}>{settings.thankYouMessage}</p>
<button style={btn(true)} onClick={() => { resetForm(); setView(“landing”); }}>Done</button>
</div>
);

/* ── Admin Login ── */
if (view === “admin” && !adminAuth) return wrap(
<div style={{ …card, maxWidth: 380 }}>
<h2 style={{ fontFamily: “‘Playfair Display’,serif”, fontSize: 20, color: “#0f172a”, marginBottom: 18, textAlign: “center” }}>Admin Access</h2>
<Field label="Password" value={adminPass} onChange={setAdminPass} type="password" placeholder="Enter admin password" error={errors.admin} />
<div style={{ display: “flex”, gap: 8 }}>
<button style={btn(false)} onClick={() => { setView(“landing”); setAdminPass(””); setErrors({}); }}>← Back</button>
<button style={btn(true, { flex: 1 })} onClick={() => {
if (adminPass === settings.adminPass) { setAuth(true); setAdminPass(””); setErrors({}); }
else setErrors({ admin: “Incorrect password” });
}}>Sign In</button>
</div>
</div>
);

/* ── Admin Panel ── */
if (view === “admin” && adminAuth) {
const avgRating = submissions.length > 0
? (submissions.reduce((sum, s) => sum + Object.values(s.ratings).reduce((a, b) => a + b, 0) / Math.max(Object.values(s.ratings).length, 1), 0) / submissions.length).toFixed(1)
: “—”;
const qAvgs = questions.map(q => {
const vals = submissions.map(s => s.ratings[q.id]).filter(v => v !== undefined);
return { …q, avg: vals.length > 0 ? (vals.reduce((a, b) => a + b, 0) / vals.length).toFixed(1) : “—”, count: vals.length };
});

```
const exportCSV = () => {
  if (!submissions.length) { flash("No data to export"); return; }
  const allQIds = [...new Set(submissions.flatMap(s => Object.keys(s.ratings)))];
  const qMap = {}; submissions.forEach(s => (s.questionSnapshot || []).forEach(q => { qMap[q.id] = q.text; }));
  const headers = ["Date","First Name","Surname","Email", ...allQIds.map(id => qMap[id] || id), "Comments"];
  const rows = submissions.map(s => [
    new Date(s.timestamp).toLocaleDateString(), s.firstName, s.surname, s.email,
    ...allQIds.map(id => s.ratings[id] ?? ""), '"' + (s.freeText || "").replace(/"/g, '""') + '"',
  ]);
  const csv = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "feedback_" + new Date().toISOString().slice(0, 10) + ".csv";
  a.click(); URL.revokeObjectURL(a.href); flash("CSV exported!");
};

return (
  <div style={{ minHeight: "100vh", padding: 0 }}>
    {/* Header */}
    <div style={{ background: "#fff", borderBottom: "1px solid #e2e8f0", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, zIndex: 10 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 30, height: 30, borderRadius: 8, background: "#1e293b", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </div>
        <span style={{ fontWeight: 700, color: "#0f172a", fontSize: 14 }}>Admin</span>
      </div>
      <div style={{ display: "flex", gap: 6 }}>
        <button style={btn(false, { padding: "6px 12px", fontSize: 11 })} onClick={() => setView("landing")}>View Site</button>
        <button style={btn(false, { padding: "6px 12px", fontSize: 11, color: "#ef4444" })} onClick={() => { setAuth(false); setView("landing"); }}>Sign Out</button>
      </div>
    </div>

    <div className="animate-in" style={{ padding: "16px 14px", maxWidth: 880, margin: "0 auto" }}>
      {/* Tabs */}
      <div style={{ display: "flex", gap: 3, background: "#fff", borderRadius: 10, padding: 3, marginBottom: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04)", overflowX: "auto" }}>
        {[["dashboard","Dashboard"],["questions","Questions"],["submissions","Responses"],["settings","Settings"]].map(([k,l]) => (
          <button key={k} style={pill(adminTab === k)} onClick={() => setAdminTab(k)}>{l}</button>
        ))}
      </div>

      {/* Dashboard */}
      {adminTab === "dashboard" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, marginBottom: 24 }}>
            {[
              { label: "Responses", value: submissions.length, color: "#3b82f6" },
              { label: "Avg Rating", value: avgRating, color: "#10b981" },
              { label: "Questions", value: questions.length, color: "#8b5cf6" },
              { label: "This Week", value: submissions.filter(s => new Date(s.timestamp) > new Date(Date.now() - 7*864e5)).length, color: "#f59e0b" },
            ].map(s => (
              <div key={s.label} style={{ background: "#fff", borderRadius: 12, padding: "16px 14px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
                <p style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>{s.label}</p>
                <p style={{ fontSize: 26, fontWeight: 700, color: s.color }}>{s.value}</p>
              </div>
            ))}
          </div>
          <div style={{ background: "#fff", borderRadius: 12, padding: 18, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <h3 style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 14 }}>Question Performance</h3>
            {qAvgs.map(q => (
              <div key={q.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #f8fafc" }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <p style={{ fontSize: 12, color: "#334155", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{q.text}</p>
                  <p style={{ fontSize: 10, color: "#94a3b8", marginTop: 1 }}>{q.count} responses</p>
                </div>
                <div style={{ width: 80, height: 5, borderRadius: 3, background: "#f1f5f9", flexShrink: 0 }}>
                  <div style={{ width: q.avg !== "—" ? `${(parseFloat(q.avg)/10)*100}%` : "0%", height: "100%", borderRadius: 3, background: parseFloat(q.avg) >= 7 ? "#10b981" : parseFloat(q.avg) >= 4 ? "#f59e0b" : "#ef4444", transition: "width 0.6s" }} />
                </div>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#0f172a", minWidth: 28, textAlign: "right" }}>{q.avg}</span>
              </div>
            ))}
            {qAvgs.length === 0 && <p style={{ color: "#94a3b8", fontSize: 13 }}>Add questions to see performance data.</p>}
          </div>
        </div>
      )}

      {/* Questions */}
      {adminTab === "questions" && (
        <div>
          <div style={{ background: "#fff", borderRadius: 12, padding: 18, marginBottom: 16, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <h3 style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 14 }}>Add New Question</h3>
            <input value={newQ.text} onChange={e => setNewQ({ ...newQ, text: e.target.value })} placeholder="Question text..."
              style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, fontFamily: "'DM Sans',sans-serif", marginBottom: 8 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <input value={newQ.category} onChange={e => setNewQ({ ...newQ, category: e.target.value })} placeholder="Category (optional)"
                style={{ flex: 1, padding: "10px 12px", borderRadius: 8, border: "1.5px solid #e2e8f0", fontSize: 13, fontFamily: "'DM Sans',sans-serif" }} />
              <button style={btn(true, { padding: "10px 18px" })} onClick={() => {
                if (!newQ.text.trim()) return;
                saveQ([...questions, { id: "q" + Date.now(), text: newQ.text.trim(), category: newQ.category.trim() || "General" }]);
                setNewQ({ text: "", category: "" }); flash("Question added");
              }}>+ Add</button>
            </div>
          </div>
          <div style={{ background: "#fff", borderRadius: 12, padding: 18, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
            <h3 style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 14 }}>Current Questions ({questions.length})</h3>
            {questions.length === 0 && <p style={{ color: "#94a3b8", fontSize: 13 }}>No questions yet.</p>}
            {questions.map((q, i) => (
              <div key={q.id} style={{ padding: "10px 0", borderBottom: i < questions.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                {editQ?.id === q.id ? (
                  <div>
                    <input value={editQ.text} onChange={e => setEditQ({ ...editQ, text: e.target.value })}
                      style={{ width: "100%", padding: "8px 10px", borderRadius: 6, border: "1.5px solid #1e293b", fontSize: 13, fontFamily: "'DM Sans',sans-serif", marginBottom: 6 }} />
                    <div style={{ display: "flex", gap: 6 }}>
                      <input value={editQ.category} onChange={e => setEditQ({ ...editQ, category: e.target.value })}
                        style={{ flex: 1, padding: "8px 10px", borderRadius: 6, border: "1.5px solid #1e293b", fontSize: 13, fontFamily: "'DM Sans',sans-serif" }} />
                      <button style={btn(true, { padding: "6px 14px", fontSize: 12 })} onClick={() => {
                        saveQ(questions.map(x => x.id === editQ.id ? editQ : x)); setEditQ(null); flash("Question updated");
                      }}>Save</button>
                      <button style={btn(false, { padding: "6px 14px", fontSize: 12 })} onClick={() => setEditQ(null)}>Cancel</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#cbd5e1", minWidth: 16 }}>{i + 1}</span>
                    <span style={{ flex: 1, fontSize: 13, color: "#334155" }}>{q.text}</span>
                    <span style={{ fontSize: 10, background: "#f1f5f9", color: "#64748b", padding: "2px 7px", borderRadius: 4 }}>{q.category}</span>
                    <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: "#64748b", padding: "4px 6px" }} onClick={() => setEditQ({ ...q })}>Edit</button>
                    <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 12, color: "#ef4444", padding: "4px 6px" }} onClick={() => { saveQ(questions.filter(x => x.id !== q.id)); flash("Question deleted"); }}>Delete</button>
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Submissions */}
      {adminTab === "submissions" && (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <h3 style={{ fontSize: 13, fontWeight: 600, color: "#0f172a" }}>Responses ({submissions.length})</h3>
            <div style={{ display: "flex", gap: 6 }}>
              <button style={btn(false, { padding: "7px 12px", fontSize: 11 })} onClick={exportCSV}>Export CSV</button>
              <button style={btn(false, { padding: "7px 12px", fontSize: 11, color: "#ef4444" })} onClick={() => { saveS([]); setSelectedSub(null); flash("All responses cleared"); }}>Clear All</button>
            </div>
          </div>
          {submissions.length === 0 && (
            <div style={{ background: "#fff", borderRadius: 12, padding: 36, textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              <p style={{ color: "#94a3b8", fontSize: 13 }}>No responses yet.</p>
            </div>
          )}
          {submissions.map(s => {
            const sAvg = (Object.values(s.ratings).reduce((a, b) => a + b, 0) / Math.max(Object.values(s.ratings).length, 1)).toFixed(1);
            const open = selectedSub?.id === s.id;
            return (
              <div key={s.id} style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", boxShadow: "0 1px 3px rgba(0,0,0,0.04)", cursor: "pointer", border: open ? "2px solid #1e293b" : "2px solid transparent", transition: "border 0.2s", marginBottom: 8 }}
                onClick={() => setSelectedSub(open ? null : s)}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <p style={{ fontSize: 14, fontWeight: 600, color: "#0f172a" }}>{s.firstName} {s.surname}</p>
                    <p style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{s.email}</p>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <p style={{ fontSize: 11, color: "#94a3b8" }}>{new Date(s.timestamp).toLocaleDateString()}</p>
                    <p style={{ fontSize: 13, fontWeight: 700, color: "#10b981", marginTop: 2 }}>Avg: {sAvg}</p>
                  </div>
                </div>
                {open && (
                  <div style={{ marginTop: 14, paddingTop: 14, borderTop: "1px solid #f1f5f9" }}>
                    {(s.questionSnapshot || []).map(q => (
                      <div key={q.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                        <span style={{ fontSize: 12, color: "#475569", flex: 1 }}>{q.text}</span>
                        <span style={{ fontSize: 12, fontWeight: 700, minWidth: 24, textAlign: "center", padding: "2px 7px", borderRadius: 5,
                          background: (s.ratings[q.id]??0) >= 7 ? "#d1fae5" : (s.ratings[q.id]??0) >= 4 ? "#fef9c3" : "#fee2e2",
                          color: (s.ratings[q.id]??0) >= 7 ? "#059669" : (s.ratings[q.id]??0) >= 4 ? "#ca8a04" : "#dc2626",
                        }}>{s.ratings[q.id] ?? "—"}</span>
                      </div>
                    ))}
                    {s.freeText && (
                      <div style={{ marginTop: 10, padding: 10, background: "#f8fafc", borderRadius: 8, border: "1px solid #e2e8f0" }}>
                        <p style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8", marginBottom: 3 }}>Comments</p>
                        <p style={{ fontSize: 12, color: "#334155", lineHeight: 1.5, whiteSpace: "pre-wrap" }}>{s.freeText}</p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* Settings */}
      {adminTab === "settings" && (
        <div style={{ background: "#fff", borderRadius: 12, padding: 20, boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
          <h3 style={{ fontSize: 13, fontWeight: 600, color: "#0f172a", marginBottom: 18 }}>Site Settings</h3>
          <Field label="Page Title" value={settingsForm.title || ""} onChange={v => setSettingsForm({ ...settingsForm, title: v })} />
          <Field label="Subtitle" value={settingsForm.subtitle || ""} onChange={v => setSettingsForm({ ...settingsForm, subtitle: v })} />
          <Field label="Thank You Message" value={settingsForm.thankYouMessage || ""} onChange={v => setSettingsForm({ ...settingsForm, thankYouMessage: v })} />
          <Field label="Admin Password" value={settingsForm.adminPass || ""} onChange={v => setSettingsForm({ ...settingsForm, adminPass: v })} type="password" />
          <button style={btn(true)} onClick={() => { saveSt(settingsForm); flash("Settings saved"); }}>Save Settings</button>
        </div>
      )}
    </div>
    {toast && <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "#1e293b", color: "#fff", padding: "10px 22px", borderRadius: 10, fontSize: 13, fontWeight: 500, zIndex: 999, animation: "fadeUp 0.3s ease" }}>{toast}</div>}
  </div>
);

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
