<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;min-height:100vh}
.hide{display:none !important}
#error-box{background:#fee2e2;color:#991b1b;padding:20px;margin:20px;border-radius:12px;font-size:14px;white-space:pre-wrap;display:none}

/* Layout */
.page{min-height:100vh;padding:20px 16px;display:flex;align-items:flex-start;justify-content:center}
.container{max-width:600px;width:100%;margin-top:20px}
.card{background:#fff;border-radius:16px;padding:28px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}

/* Typography */
h1{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:8px}
h2{font-size:22px;font-weight:700;color:#0f172a;margin-bottom:16px}
h3{font-size:16px;font-weight:600;color:#0f172a;margin-bottom:12px}
p{color:#64748b;font-size:14px;line-height:1.6}
.step-label{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}

/* Progress */
.progress{display:flex;gap:6px;margin-bottom:24px}
.progress-dot{flex:1;height:4px;border-radius:2px;background:#e2e8f0}
.progress-dot.active{background:#1e293b}

/* Buttons */
.btn{padding:12px 24px;border-radius:12px;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;transition:opacity 0.2s}
.btn:active{opacity:0.8}
.btn-dark{background:#1e293b;color:#fff}
.btn-light{background:#f1f5f9;color:#475569}
.btn-green{background:#059669;color:#fff}
.btn-row{display:flex;justify-content:space-between;margin-top:20px}

/* Form */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:4px}
.form-group input,.form-group textarea{width:100%;padding:12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:15px;font-family:inherit;background:#f8fafc}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:#1e293b}
.form-group .error-text{font-size:12px;color:#ef4444;margin-top:2px}
.form-group textarea{resize:vertical;line-height:1.6}

/* Rating */
.question-block{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid #f1f5f9}
.question-block:last-child{border-bottom:none}
.question-text{font-size:14px;font-weight:500;color:#1e293b;margin-bottom:4px}
.question-cat{font-size:10px;background:#f1f5f9;color:#64748b;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px}
.rating-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.rating-label{font-size:10px;color:#94a3b8;min-width:28px}
.rating-btn{width:32px;height:32px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;padding:0;transition:all 0.15s}

/* Alert */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
.alert-error{background:#fef2f2;color:#dc2626}
.alert-success{background:#f0fdf4;color:#16a34a}

/* Summary */
.summary{background:#f8fafc;border-radius:10px;padding:14px;border:1px solid #e2e8f0;margin-top:16px}
.summary p{font-size:13px;margin-top:2px}

/* Admin */
.admin-header{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.tab-row{display:flex;gap:2px;background:#fff;border-radius:10px;padding:3px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow-x:auto}
.tab-btn{padding:8px 14px;border-radius:8px;border:none;font-weight:500;font-size:13px;cursor:pointer;font-family:inherit;background:transparent;color:#64748b;white-space:nowrap}
.tab-btn.active{background:#1e293b;color:#fff}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.stat-card .stat-label{font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px}
.stat-card .stat-val{font-size:24px;font-weight:700}
.sub-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);margin-bottom:8px;cursor:pointer;border:2px solid transparent;transition:border 0.2s}
.sub-card.open{border-color:#1e293b}
.sub-detail{margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9}
.score-pill{font-size:12px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-block}
.comment-block{margin-top:8px;padding:10px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}

.icon-box{width:48px;height:48px;border-radius:12px;background:#1e293b;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.check-circle{width:60px;height:60px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
.center{text-align:center}
.link{color:#94a3b8;font-size:12px;cursor:pointer;text-decoration:underline}
.perf-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f8fafc}
.perf-bar-bg{width:60px;height:5px;border-radius:3px;background:#f1f5f9;flex-shrink:0}
.perf-bar{height:100%;border-radius:3px}
.q-edit-row{display:flex;align-items:center;gap:6px;padding:8px 0;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:999}
</style>
</head>
<body>

<div id="error-box"></div>
<div id="app"></div>

<script>
// Show errors visually instead of blank page
window.onerror = function(msg, url, line) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  box.textContent = "Error: " + msg + "\nLine: " + line;
};

try {

// ── Storage ──
function dbGet(key, fallback) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch(e) { return fallback; }
}
function dbSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

// ── Data ──
var questions = dbGet("fb_q", [
  {id:"q1", text:"How would you rate the overall quality of service?", cat:"Service"},
  {id:"q2", text:"How responsive was our team to your needs?", cat:"Service"},
  {id:"q3", text:"How would you rate the value for money?", cat:"Value"},
  {id:"q4", text:"How likely are you to recommend us to others?", cat:"Loyalty"}
]);
var submissions = dbGet("fb_s", []);
var settings = dbGet("fb_st", {
  title: "Feedback Portal",
  subtitle: "We value your honest feedback. It helps us improve.",
  pw: "admin123",
  ty: "Your feedback has been recorded and will be reviewed by our team."
});

// ── App State ──
var state = {
  page: "landing",
  fn: "", sn: "", em: "", ratings: {}, freetext: "",
  errors: {},
  authed: false, passInput: "",
  adminTab: "dashboard",
  editId: null, editText: "", editCat: "",
  newText: "", newCat: "",
  openSub: null
};

var app = document.getElementById("app");

// ── Helpers ──
function esc(str) {
  var div = document.createElement("div");
  div.appendChild(document.createTextNode(str || ""));
  return div.innerHTML;
}

function ratingColor(n) {
  if (n <= 2) return "#ef4444";
  if (n <= 4) return "#f97316";
  if (n <= 6) return "#eab308";
  if (n <= 8) return "#22c55e";
  return "#10b981";
}

function toast(msg) {
  var old = document.getElementById("toast-el");
  if (old) old.remove();
  var t = document.createElement("div");
  t.id = "toast-el";
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

function listen(id, event, fn) {
  var el = document.getElementById(id);
  if (el) el.addEventListener(event, fn);
}

// ── Render ──
function render() {
  var html = "";

  // ──────── LANDING ────────
  if (state.page === "landing") {
    html = '<div class="page"><div class="container center">' +
      '<div class="icon-box"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>' +
      '<h1>' + esc(settings.title) + '</h1>' +
      '<p style="max-width:380px;margin:0 auto 32px">' + esc(settings.subtitle) + '</p>' +
      '<button class="btn btn-dark" id="start-btn">Begin Feedback →</button>' +
      '<p style="margin-top:40px"><span class="link" id="admin-link">Admin Access</span></p>' +
      '</div></div>';

    app.innerHTML = html;
    listen("start-btn", "click", function() {
      state.fn = ""; state.sn = ""; state.em = ""; state.ratings = {}; state.freetext = ""; state.errors = {};
      state.page = "step1"; render();
    });
    listen("admin-link", "click", function() { state.page = "admin-login"; render(); });
    return;
  }

  // ──────── STEP 1 ────────
  if (state.page === "step1") {
    html = '<div class="page"><div class="container"><div class="card">' +
      '<div class="progress"><div class="progress-dot active"></div><div class="progress-dot"></div><div class="progress-dot"></div></div>' +
      '<div class="step-label">Step 1 of 3</div>' +
      '<h2>Your Details</h2>' +
      '<div class="form-group"><label>First Name</label><input id="i-fn" placeholder="Jane" value="' + esc(state.fn) + '">' +
        (state.errors.fn ? '<div class="error-text">' + esc(state.errors.fn) + '</div>' : '') + '</div>' +
      '<div class="form-group"><label>Surname</label><input id="i-sn" placeholder="Smith" value="' + esc(state.sn) + '">' +
        (state.errors.sn ? '<div class="error-text">' + esc(state.errors.sn) + '</div>' : '') + '</div>' +
      '<div class="form-group"><label>Email Address</label><input id="i-em" type="email" placeholder="jane@example.com" value="' + esc(state.em) + '">' +
        (state.errors.em ? '<div class="error-text">' + esc(state.errors.em) + '</div>' : '') + '</div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-light" id="back-btn">← Back</button>' +
        '<button class="btn btn-dark" id="next-btn">Continue →</button>' +
      '</div></div></div></div>';

    app.innerHTML = html;
    listen("back-btn", "click", function() { state.page = "landing"; render(); });
    listen("next-btn", "click", function() {
      state.fn = document.getElementById("i-fn").value;
      state.sn = document.getElementById("i-sn").value;
      state.em = document.getElementById("i-em").value;
      var err = {};
      if (!state.fn.trim()) err.fn = "Required";
      if (!state.sn.trim()) err.sn = "Required";
      if (!state.em.trim()) err.em = "Required";
      else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.em)) err.em = "Invalid email";
      state.errors = err;
      if (Object.keys(err).length === 0) state.page = "step2";
      render();
    });
    return;
  }

  // ──────── STEP 2 ────────
  if (state.page === "step2") {
    var qhtml = "";
    for (var i = 0; i < questions.length; i++) {
      var q = questions[i];
      var rbtns = '<div class="rating-row"><span class="rating-label">Worst</span>';
      for (var n = 0; n <= 10; n++) {
        var sel = state.ratings[q.id] === n;
        var c = ratingColor(n);
        var style = sel ? 'border-color:'+c+';background:'+c+';color:#fff;transform:scale(1.1);box-shadow:0 2px 8px '+c+'44' : '';
        rbtns += '<button class="rating-btn" data-qid="' + q.id + '" data-val="' + n + '" style="' + style + '">' + n + '</button>';
      }
      rbtns += '<span class="rating-label">Best</span></div>';
      qhtml += '<div class="question-block">' +
        '<div class="question-text">' + (i+1) + '. ' + esc(q.text) + '</div>' +
        (q.cat ? '<div class="question-cat">' + esc(q.cat) + '</div>' : '') +
        rbtns + '</div>';
    }

    html = '<div class="page"><div class="container"><div class="card">' +
      '<div class="progress"><div class="progress-dot active"></div><div class="progress-dot active"></div><div class="progress-dot"></div></div>' +
      '<div class="step-label">Step 2 of 3</div>' +
      '<h2>Rate Your Experience</h2>' +
      '<p style="margin-bottom:20px">0 = worst · 10 = best</p>' +
      (state.errors.rat ? '<div class="alert alert-error">' + esc(state.errors.rat) + '</div>' : '') +
      qhtml +
      '<div class="btn-row">' +
        '<button class="btn btn-light" id="back-btn">← Back</button>' +
        '<button class="btn btn-dark" id="next-btn">Continue →</button>' +
      '</div></div></div></div>';

    app.innerHTML = html;
    // Rating clicks via delegation
    app.addEventListener("click", function handler(ev) {
      if (ev.target.classList.contains("rating-btn")) {
        state.ratings[ev.target.getAttribute("data-qid")] = parseInt(ev.target.getAttribute("data-val"));
        app.removeEventListener("click", handler);
        render();
      }
    });
    listen("back-btn", "click", function() { state.page = "step1"; render(); });
    listen("next-btn", "click", function() {
      var unanswered = 0;
      for (var i = 0; i < questions.length; i++) {
        if (state.ratings[questions[i].id] === undefined) unanswered++;
      }
      if (unanswered > 0) { state.errors = { rat: "Please rate all " + unanswered + " remaining question(s)" }; render(); return; }
      state.errors = {}; state.page = "step3"; render();
    });
    return;
  }

  // ──────── STEP 3 ────────
  if (state.page === "step3") {
    var vals = Object.values(state.ratings);
    var avg = vals.length > 0 ? (vals.reduce(function(a,b){return a+b},0) / vals.length).toFixed(1) : "0";

    html = '<div class="page"><div class="container"><div class="card">' +
      '<div class="progress"><div class="progress-dot active"></div><div class="progress-dot active"></div><div class="progress-dot active"></div></div>' +
      '<div class="step-label">Step 3 of 3</div>' +
      '<h2>Additional Comments</h2>' +
      '<p style="margin-bottom:16px">Anything else you\'d like us to know? (Optional)</p>' +
      '<div class="form-group"><textarea id="i-ft" rows="4" placeholder="Share any additional thoughts...">' + esc(state.freetext) + '</textarea></div>' +
      '<div class="summary">' +
        '<p style="font-size:11px;font-weight:600;color:#475569;margin-bottom:4px">Review Summary</p>' +
        '<p>' + esc(state.fn) + ' ' + esc(state.sn) + ' · ' + esc(state.em) + '</p>' +
        '<p>' + vals.length + ' questions rated · Avg: ' + avg + '/10</p>' +
      '</div>' +
      '<div class="btn-row">' +
        '<button class="btn btn-light" id="back-btn">← Back</button>' +
        '<button class="btn btn-green" id="submit-btn">Submit Feedback ✓</button>' +
      '</div></div></div></div>';

    app.innerHTML = html;
    listen("back-btn", "click", function() { state.page = "step2"; render(); });
    listen("submit-btn", "click", function() {
      state.freetext = document.getElementById("i-ft").value;
      var sub = {
        id: "s" + Date.now(),
        firstName: state.fn.trim(), surname: state.sn.trim(), email: state.em.trim(),
        ratings: JSON.parse(JSON.stringify(state.ratings)),
        freeText: state.freetext.trim(),
        ts: new Date().toISOString(),
        snap: questions.map(function(q) { return {id:q.id, text:q.text, cat:q.cat}; })
      };
      submissions.unshift(sub);
      dbSet("fb_s", submissions);
      state.page = "thankyou"; render();
    });
    return;
  }

  // ──────── THANK YOU ────────
  if (state.page === "thankyou") {
    html = '<div class="page"><div class="container"><div class="card center" style="padding:44px 24px">' +
      '<div class="check-circle">✓</div>' +
      '<h2>Thank You!</h2>' +
      '<p style="max-width:340px;margin:0 auto 24px">' + esc(settings.ty) + '</p>' +
      '<button class="btn btn-dark" id="done-btn">Done</button>' +
      '</div></div></div>';

    app.innerHTML = html;
    listen("done-btn", "click", function() { state.page = "landing"; render(); });
    return;
  }

  // ──────── ADMIN LOGIN ────────
  if (state.page === "admin-login") {
    html = '<div class="page"><div class="container"><div class="card" style="max-width:380px;margin:0 auto">' +
      '<h2 style="text-align:center">Admin Access</h2>' +
      '<div class="form-group"><label>Password</label><input id="i-pw" type="password" placeholder="Enter admin password">' +
        (state.errors.pw ? '<div class="error-text">' + esc(state.errors.pw) + '</div>' : '') + '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="btn btn-light" id="back-btn">← Back</button>' +
        '<button class="btn btn-dark" id="login-btn" style="flex:1">Sign In</button>' +
      '</div></div></div></div>';

    app.innerHTML = html;
    listen("back-btn", "click", function() { state.errors = {}; state.page = "landing"; render(); });
    listen("login-btn", "click", function() {
      var pw = document.getElementById("i-pw").value;
      if (pw === settings.pw) { state.authed = true; state.errors = {}; state.page = "admin"; render(); }
      else { state.errors = { pw: "Incorrect password" }; render(); }
    });
    return;
  }

  // ──────── ADMIN PANEL ────────
  if (state.page === "admin" && state.authed) {
    renderAdminPanel();
    return;
  }

  state.page = "landing"; render();
}

// ── Admin Panel ──
function renderAdminPanel() {
  var tab = state.adminTab;

  // Stats
  var totalR = submissions.length;
  var avgR = "—";
  if (totalR > 0) {
    var sum = 0;
    for (var i = 0; i < submissions.length; i++) {
      var rv = Object.values(submissions[i].ratings);
      sum += rv.length > 0 ? rv.reduce(function(a,b){return a+b},0) / rv.length : 0;
    }
    avgR = (sum / totalR).toFixed(1);
  }
  var weekCount = 0;
  var weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
  for (var i = 0; i < submissions.length; i++) {
    if (new Date(submissions[i].ts).getTime() > weekAgo) weekCount++;
  }

  var tabsHtml = "";
  var tabs = [["dashboard","Dashboard"],["questions","Questions"],["submissions","Responses"],["settings","Settings"]];
  for (var i = 0; i < tabs.length; i++) {
    tabsHtml += '<button class="tab-btn' + (tab === tabs[i][0] ? " active" : "") + '" data-tab="' + tabs[i][0] + '">' + tabs[i][1] + '</button>';
  }

  var content = "";

  // DASHBOARD
  if (tab === "dashboard") {
    var perfHtml = "";
    for (var i = 0; i < questions.length; i++) {
      var q = questions[i];
      var vals = [];
      for (var j = 0; j < submissions.length; j++) {
        if (submissions[j].ratings[q.id] !== undefined) vals.push(submissions[j].ratings[q.id]);
      }
      var qavg = vals.length > 0 ? (vals.reduce(function(a,b){return a+b},0) / vals.length).toFixed(1) : "—";
      var pct = qavg !== "—" ? (parseFloat(qavg) / 10 * 100) : 0;
      var barColor = parseFloat(qavg) >= 7 ? "#10b981" : parseFloat(qavg) >= 4 ? "#f59e0b" : "#ef4444";
      perfHtml += '<div class="perf-row">' +
        '<div style="flex:1;min-width:0"><div style="font-size:12px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(q.text) + '</div><div style="font-size:10px;color:#94a3b8">' + vals.length + ' responses</div></div>' +
        '<div class="perf-bar-bg"><div class="perf-bar" style="width:' + pct + '%;background:' + barColor + '"></div></div>' +
        '<span style="font-size:13px;font-weight:700;color:#0f172a;min-width:28px;text-align:right">' + qavg + '</span></div>';
    }
    content = '<div class="stat-grid">' +
      '<div class="stat-card"><div class="stat-label">Responses</div><div class="stat-val" style="color:#3b82f6">' + totalR + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Avg Rating</div><div class="stat-val" style="color:#10b981">' + avgR + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">Questions</div><div class="stat-val" style="color:#8b5cf6">' + questions.length + '</div></div>' +
      '<div class="stat-card"><div class="stat-label">This Week</div><div class="stat-val" style="color:#f59e0b">' + weekCount + '</div></div>' +
      '</div><div class="card"><h3>Question Performance</h3>' + (perfHtml || '<p>No data yet.</p>') + '</div>';
  }

  // QUESTIONS
  if (tab === "questions") {
    var qList = "";
    for (var i = 0; i < questions.length; i++) {
      var q = questions[i];
      if (state.editId === q.id) {
        qList += '<div style="padding:8px 0;border-bottom:1px solid #f1f5f9">' +
          '<input id="eq-text" value="' + esc(state.editText) + '" style="width:100%;padding:8px;border-radius:6px;border:2px solid #1e293b;font-size:13px;margin-bottom:6px;font-family:inherit">' +
          '<div style="display:flex;gap:6px"><input id="eq-cat" value="' + esc(state.editCat) + '" style="flex:1;padding:8px;border-radius:6px;border:2px solid #1e293b;font-size:13px;font-family:inherit">' +
          '<button class="btn btn-dark" style="padding:6px 14px;font-size:12px" id="save-eq">Save</button>' +
          '<button class="btn btn-light" style="padding:6px 14px;font-size:12px" id="cancel-eq">Cancel</button></div></div>';
      } else {
        qList += '<div class="q-edit-row" style="border-bottom:1px solid #f1f5f9">' +
          '<span style="font-size:11px;font-weight:700;color:#cbd5e1;min-width:16px">' + (i+1) + '</span>' +
          '<span style="flex:1;font-size:13px;color:#334155;min-width:80px">' + esc(q.text) + '</span>' +
          '<span class="question-cat">' + esc(q.cat) + '</span>' +
          '<button style="background:none;border:none;font-size:12px;color:#64748b;cursor:pointer" data-edit="' + q.id + '">Edit</button>' +
          '<button style="background:none;border:none;font-size:12px;color:#ef4444;cursor:pointer" data-del="' + q.id + '">Delete</button></div>';
      }
    }
    content = '<div class="card" style="margin-bottom:14px"><h3>Add New Question</h3>' +
      '<input id="nq-text" placeholder="Question text..." value="' + esc(state.newText) + '" style="width:100%;padding:10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;margin-bottom:8px;font-family:inherit">' +
      '<div style="display:flex;gap:8px"><input id="nq-cat" placeholder="Category" value="' + esc(state.newCat) + '" style="flex:1;padding:10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;font-family:inherit">' +
      '<button class="btn btn-dark" style="padding:10px 18px;font-size:13px" id="add-q">+ Add</button></div></div>' +
      '<div class="card"><h3>Current Questions (' + questions.length + ')</h3>' +
      (questions.length === 0 ? '<p>No questions yet.</p>' : qList) + '</div>';
  }

  // SUBMISSIONS
  if (tab === "submissions") {
    var subHtml = "";
    if (submissions.length === 0) {
      subHtml = '<div class="card center" style="padding:36px"><p>No responses yet.</p></div>';
    } else {
      for (var i = 0; i < submissions.length; i++) {
        var s = submissions[i];
        var rv = Object.values(s.ratings);
        var sa = rv.length > 0 ? (rv.reduce(function(a,b){return a+b},0) / rv.length).toFixed(1) : "0";
        var isOpen = state.openSub === s.id;
        var detail = "";
        if (isOpen) {
          detail = '<div class="sub-detail">';
          var snap = s.snap || [];
          for (var j = 0; j < snap.length; j++) {
            var sq = snap[j];
            var sv = s.ratings[sq.id];
            var svn = sv !== undefined ? sv : 0;
            var bg = svn >= 7 ? "#d1fae5" : svn >= 4 ? "#fef9c3" : "#fee2e2";
            var tc = svn >= 7 ? "#059669" : svn >= 4 ? "#ca8a04" : "#dc2626";
            detail += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
              '<span style="font-size:12px;color:#475569;flex:1">' + esc(sq.text) + '</span>' +
              '<span class="score-pill" style="background:' + bg + ';color:' + tc + '">' + (sv !== undefined ? sv : "—") + '</span></div>';
          }
          if (s.freeText) {
            detail += '<div class="comment-block"><div style="font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:2px">Comments</div><div style="font-size:12px;color:#334155;line-height:1.5;white-space:pre-wrap">' + esc(s.freeText) + '</div></div>';
          }
          detail += '</div>';
        }
        subHtml += '<div class="sub-card' + (isOpen ? " open" : "") + '" data-sid="' + s.id + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div><div style="font-size:14px;font-weight:600;color:#0f172a">' + esc(s.firstName) + ' ' + esc(s.surname) + '</div><div style="font-size:11px;color:#94a3b8;margin-top:2px">' + esc(s.email) + '</div></div>' +
            '<div style="text-align:right"><div style="font-size:11px;color:#94a3b8">' + new Date(s.ts).toLocaleDateString() + '</div><div style="font-size:13px;font-weight:700;color:#10b981;margin-top:2px">Avg: ' + sa + '</div></div>' +
          '</div>' + detail + '</div>';
      }
    }
    content = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">' +
      '<h3 style="margin:0">Responses (' + submissions.length + ')</h3>' +
      '<div style="display:flex;gap:6px"><button class="btn btn-light" style="padding:7px 12px;font-size:11px" id="csv-btn">Export CSV</button>' +
      '<button class="btn btn-light" style="padding:7px 12px;font-size:11px;color:#ef4444" id="clear-btn">Clear All</button></div></div>' + subHtml;
  }

  // SETTINGS
  if (tab === "settings") {
    content = '<div class="card"><h3>Site Settings</h3>' +
      '<div class="form-group"><label>Page Title</label><input id="s-title" value="' + esc(settings.title) + '"></div>' +
      '<div class="form-group"><label>Subtitle</label><input id="s-sub" value="' + esc(settings.subtitle) + '"></div>' +
      '<div class="form-group"><label>Thank You Message</label><input id="s-ty" value="' + esc(settings.ty) + '"></div>' +
      '<div class="form-group"><label>Admin Password</label><input id="s-pw" type="password" value="' + esc(settings.pw) + '"></div>' +
      '<button class="btn btn-dark" id="save-settings">Save Settings</button></div>';
  }

  app.innerHTML = '<div style="min-height:100vh">' +
    '<div class="admin-header">' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="width:28px;height:28px;border-radius:8px;background:#1e293b;display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>' +
        '<span style="font-weight:700;color:#0f172a;font-size:14px">Admin</span>' +
      '</div>' +
      '<div style="display:flex;gap:6px">' +
        '<button class="btn btn-light" style="padding:6px 12px;font-size:11px" id="view-site">View Site</button>' +
        '<button class="btn btn-light" style="padding:6px 12px;font-size:11px;color:#ef4444" id="sign-out">Sign Out</button>' +
      '</div>' +
    '</div>' +
    '<div style="padding:16px 14px;max-width:880px;margin:0 auto">' +
      '<div class="tab-row">' + tabsHtml + '</div>' + content +
    '</div></div>';

  // Wire up events
  listen("view-site", "click", function() { state.page = "landing"; render(); });
  listen("sign-out", "click", function() { state.authed = false; state.page = "landing"; render(); });

  // Tab clicks
  var tabBtns = document.querySelectorAll("[data-tab]");
  for (var i = 0; i < tabBtns.length; i++) {
    tabBtns[i].addEventListener("click", function(ev) {
      state.adminTab = ev.target.getAttribute("data-tab"); render();
    });
  }

  // Questions tab events
  if (tab === "questions") {
    listen("add-q", "click", function() {
      state.newText = document.getElementById("nq-text").value;
      state.newCat = document.getElementById("nq-cat").value;
      if (!state.newText.trim()) return;
      questions.push({id: "q" + Date.now(), text: state.newText.trim(), cat: state.newCat.trim() || "General"});
      dbSet("fb_q", questions); state.newText = ""; state.newCat = ""; toast("Added"); render();
    });
    var editBtns = document.querySelectorAll("[data-edit]");
    for (var i = 0; i < editBtns.length; i++) {
      editBtns[i].addEventListener("click", function(ev) {
        ev.stopPropagation();
        var qid = ev.target.getAttribute("data-edit");
        for (var j = 0; j < questions.length; j++) {
          if (questions[j].id === qid) { state.editId = qid; state.editText = questions[j].text; state.editCat = questions[j].cat; break; }
        }
        render();
      });
    }
    var delBtns = document.querySelectorAll("[data-del]");
    for (var i = 0; i < delBtns.length; i++) {
      delBtns[i].addEventListener("click", function(ev) {
        ev.stopPropagation();
        var qid = ev.target.getAttribute("data-del");
        questions = questions.filter(function(q) { return q.id !== qid; });
        dbSet("fb_q", questions); toast("Deleted"); render();
      });
    }
    listen("save-eq", "click", function() {
      state.editText = document.getElementById("eq-text").value;
      state.editCat = document.getElementById("eq-cat").value;
      for (var i = 0; i < questions.length; i++) {
        if (questions[i].id === state.editId) { questions[i].text = state.editText.trim(); questions[i].cat = state.editCat.trim() || "General"; break; }
      }
      dbSet("fb_q", questions); state.editId = null; toast("Saved"); render();
    });
    listen("cancel-eq", "click", function() { state.editId = null; render(); });
  }

  // Submissions tab events
  if (tab === "submissions") {
    var subCards = document.querySelectorAll("[data-sid]");
    for (var i = 0; i < subCards.length; i++) {
      subCards[i].addEventListener("click", function(ev) {
        var sid = ev.currentTarget.getAttribute("data-sid");
        state.openSub = state.openSub === sid ? null : sid;
        render();
      });
    }
    listen("csv-btn", "click", function() {
      if (!submissions.length) { toast("No data"); return; }
      var ids = []; for (var i = 0; i < submissions.length; i++) { var keys = Object.keys(submissions[i].ratings); for (var j = 0; j < keys.length; j++) { if (ids.indexOf(keys[j]) < 0) ids.push(keys[j]); } }
      var qm = {}; for (var i = 0; i < submissions.length; i++) { var sn = submissions[i].snap || []; for (var j = 0; j < sn.length; j++) { qm[sn[j].id] = sn[j].text; } }
      var hdrs = ["Date","First Name","Surname","Email"];
      for (var i = 0; i < ids.length; i++) hdrs.push(qm[ids[i]] || ids[i]);
      hdrs.push("Comments");
      var rows = [hdrs.join(",")];
      for (var i = 0; i < submissions.length; i++) {
        var s = submissions[i];
        var row = [new Date(s.ts).toLocaleDateString(), s.firstName, s.surname, s.email];
        for (var j = 0; j < ids.length; j++) row.push(s.ratings[ids[j]] !== undefined ? s.ratings[ids[j]] : "");
        row.push('"' + (s.freeText || "").replace(/"/g, '""') + '"');
        rows.push(row.join(","));
      }
      var a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([rows.join("\n")], {type:"text/csv"}));
      a.download = "feedback_" + new Date().toISOString().slice(0,10) + ".csv"; a.click(); toast("Exported!");
    });
    listen("clear-btn", "click", function() { submissions = []; dbSet("fb_s", submissions); state.openSub = null; toast("Cleared"); render(); });
  }

  // Settings tab events
  if (tab === "settings") {
    listen("save-settings", "click", function() {
      settings.title = document.getElementById("s-title").value || settings.title;
      settings.subtitle = document.getElementById("s-sub").value || settings.subtitle;
      settings.ty = document.getElementById("s-ty").value || settings.ty;
      settings.pw = document.getElementById("s-pw").value || settings.pw;
      dbSet("fb_st", settings); toast("Settings saved");
    });
  }
}

// ── Start the app ──
render();

} catch(e) {
  var box = document.getElementById("error-box");
  box.style.display = "block";
  box.textContent = "Startup Error: " + e.message + "\n" + e.stack;
}
</script>
</body>
</html>
