<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(135deg,#f8fafc,#f1f5f9,#e8ecf1);min-height:100vh;color:#334155}
::selection{background:#1e293b;color:#fff}
input:focus,textarea:focus{outline:none;border-color:#1e293b!important}
button,input,textarea{font-family:inherit}
button{cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.page{min-height:100vh;padding:16px 14px}
.mx{max-width:640px;margin:0 auto;animation:fadeIn .4s ease both}
.card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04)}
.center{text-align:center}

.btn{padding:11px 24px;border-radius:12px;border:none;font-weight:600;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bp{background:#1e293b;color:#fff}
.bs2{background:#f1f5f9;color:#475569}
.bg{background:#059669;color:#fff}
.bsm{padding:7px 14px;font-size:12px}
.bxs{padding:6px 12px;font-size:11px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:#334155;margin-bottom:4px}
.field input{width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:15px;background:#f8fafc;transition:border .2s}
.field .er{font-size:12px;color:#ef4444;margin-top:3px}

.prog{display:flex;gap:6px;margin-bottom:24px}
.prog div{flex:1;height:4px;border-radius:2px;background:#e2e8f0;transition:background .4s}
.prog .on{background:#1e293b}

.rr{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.rr .rl{font-size:10px;color:#94a3b8;min-width:28px}
.rb{width:32px;height:32px;border-radius:8px;border:2px solid #e2e8f0;background:#fff;color:#64748b;font-weight:600;font-size:13px;transition:all .2s;padding:0}

.tabs{display:flex;gap:2px;background:#fff;border-radius:10px;padding:3px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);overflow-x:auto}
.tab{padding:8px 14px;border-radius:8px;border:none;font-weight:500;font-size:13px;background:transparent;color:#64748b;transition:all .2s;white-space:nowrap}
.tab.on{background:#1e293b;color:#fff}

.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.sc{background:#fff;border-radius:12px;padding:16px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

.sub{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);cursor:pointer;border:2px solid transparent;transition:border .2s;margin-bottom:8px}
.sub.open{border-color:#1e293b}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:500;z-index:999;animation:fadeIn .3s ease}
.hdr{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.alert{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px}
</style>

</head>
<body>
<div id="app"></div>
<script>
(function(){
var $=document.getElementById.bind(document);
var app=$("app");

// ─── Data ───
function g(k,f){try{var v=localStorage.getItem(k);return v?JSON.parse(v):f}catch(e){return f}}
function p(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

var qs=g(“fq”,[
{id:“q1”,text:“How would you rate the overall quality of service?”,cat:“Service”},
{id:“q2”,text:“How responsive was our team to your needs?”,cat:“Service”},
{id:“q3”,text:“How would you rate the value for money?”,cat:“Value”},
{id:“q4”,text:“How likely are you to recommend us to others?”,cat:“Loyalty”}
]);
var subs=g(“fs”,[]);
var st=g(“ft”,{title:“Feedback Portal”,subtitle:“We value your honest feedback. It helps us improve.”,pw:“admin123”,ty:“Your feedback has been recorded and will be reviewed by our team.”});

function sq(){p(“fq”,qs)}
function ss(){p(“fs”,subs)}
function sst(){p(“ft”,st)}

// ─── State ───
var S={view:“landing”,fn:””,sn:””,em:””,rat:{},ft:””,err:{},auth:false,ap:””,tab:“dashboard”,eqId:null,eqT:””,eqC:””,nqT:””,nqC:””,openSub:null,sfT:st.title,sfS:st.subtitle,sfM:st.ty,sfP:st.pw};

// ─── Helpers ───
var tt=null;
function flash(m){clearTimeout(tt);var e=document.getElementById(“tst”);if(e)e.remove();var d=document.createElement(“div”);d.id=“tst”;d.className=“toast”;d.textContent=m;document.body.appendChild(d);tt=setTimeout(function(){d.remove()},2e3)}
function e(s){var d=document.createElement(“div”);d.textContent=s;return d.innerHTML}
function rc(n){return n<=2?”#ef4444”:n<=4?”#f97316”:n<=6?”#eab308”:n<=8?”#22c55e”:”#10b981”}
function sbg(n){return n>=7?”#d1fae5”:n>=4?”#fef9c3”:”#fee2e2”}
function stc(n){return n>=7?”#059669”:n>=4?”#ca8a04”:”#dc2626”}

function prog(s){var h=’<div class="prog">’;for(var i=0;i<3;i++)h+=’<div class=”’+(i<=s?“on”:””)+’”></div>’;return h+”</div>”}
function fld(id,lb,tp,ph,er,val){return’<div class="field"><label for="'+id+'">’+e(lb)+’</label><input id=”’+id+’” type=”’+(tp||“text”)+’” placeholder=”’+e(ph||””)+’” value=”’+e(val||””)+’”’+(er?’ style=“border-color:#ef4444”’:””)+”/>”+(er?’<div class="er">’+e(er)+”</div>”:””)+”</div>”}
function rating(qid,sel){var h=’<div class="rr"><span class="rl">Worst</span>’;for(var i=0;i<=10;i++){var s=sel===i;var c=rc(i);h+=’<button class=“rb” data-q=”’+qid+’” data-v=”’+i+’”’+(s?’ style=“border-color:’+c+”;background:”+c+”;color:#fff;transform:scale(1.1);box-shadow:0 2px 8px “+c+‘44”’:””)+”>”+i+”</button>”}return h+’<span class="rl">Best</span></div>’}
function icon(sz){return’<svg width="'+(sz||24)+'" height="'+(sz||24)+'" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>’}

function bind(){
// delegate rating clicks
app.onclick=function(ev){
var t=ev.target;
if(t.classList.contains(“rb”)&&t.dataset.q){S.rat[t.dataset.q]=parseInt(t.dataset.v);R();return}
if(t.dataset.subid){var id=t.dataset.subid;S.openSub=S.openSub===id?null:id;R();return}
// find parent sub card
var p2=t.closest(”[data-subid]”);
if(p2){var id2=p2.dataset.subid;S.openSub=S.openSub===id2?null:id2;R();return}
};
}

// ─── Render ───
function R(){
var v=S.view;
app.innerHTML=””;

if(v===“landing”){
app.innerHTML=’<div class="page"><div class="mx center" style="padding-top:56px">’+
‘<div style="width:48px;height:48px;border-radius:12px;background:#1e293b;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">’+icon()+’</div>’+
‘<h1 style="font-family:Georgia,serif;font-size:28px;font-weight:700;color:#0f172a;margin-bottom:10px">’+e(st.title)+’</h1>’+
‘<p style="color:#64748b;font-size:15px;max-width:380px;margin:0 auto 32px;line-height:1.6">’+e(st.subtitle)+’</p>’+
‘<button class="btn bp" id="goBtn">Begin Feedback →</button>’+
‘<p style="margin-top:44px;font-size:12px;color:#94a3b8"><span id="adm" style="cursor:pointer;text-decoration:underline">Admin Access</span></p>’+
‘</div></div>’;
$(“goBtn”).onclick=function(){S.fn=””;S.sn=””;S.em=””;S.rat={};S.ft=””;S.err={};S.view=“step1”;R()};
$(“adm”).onclick=function(){S.view=“admin”;R()};
bind();return;
}

if(v===“step1”){
app.innerHTML=’<div class="page"><div class="mx"><div class="card">’+prog(0)+
‘<p style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Step 1 of 3</p>’+
‘<h2 style="font-family:Georgia,serif;font-size:22px;color:#0f172a;margin-bottom:20px">Your Details</h2>’+
fld(“fn”,“First Name”,“text”,“Jane”,S.err.fn,S.fn)+
fld(“sn”,“Surname”,“text”,“Smith”,S.err.sn,S.sn)+
fld(“em”,“Email Address”,“email”,“jane@example.com”,S.err.em,S.em)+
‘<div style="display:flex;justify-content:space-between;margin-top:8px">’+
‘<button class="btn bs2" id="bk">← Back</button>’+
‘<button class="btn bp" id="nx">Continue →</button>’+
‘</div></div></div></div>’;
$(“bk”).onclick=function(){S.view=“landing”;R()};
$(“nx”).onclick=function(){
S.fn=$(“fn”).value;S.sn=$(“sn”).value;S.em=$(“em”).value;
var er={};
if(!S.fn.trim())er.fn=“Required”;if(!S.sn.trim())er.sn=“Required”;
if(!S.em.trim())er.em=“Required”;else if(!/^[^\s@]+@[^\s@]+.[^\s@]+$/.test(S.em))er.em=“Invalid email”;
S.err=er;if(!Object.keys(er).length)S.view=“step2”;R();
};bind();return;
}

if(v===“step2”){
var qh=””;
for(var i=0;i<qs.length;i++){var q=qs[i];
qh+=’<div style=“margin-bottom:20px;padding-bottom:20px;’+(i<qs.length-1?“border-bottom:1px solid #f1f5f9”:””)+’”>’+
‘<div style="display:flex;gap:6px;margin-bottom:6px"><span style="font-size:12px;font-weight:700;color:#94a3b8;min-width:16px">’+(i+1)+’.</span><span style="font-size:14px;font-weight:500;color:#1e293b;line-height:1.4">’+e(q.text)+’</span></div>’+
(q.cat?’<span style="font-size:10px;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:4px;margin-left:22px;display:inline-block;margin-bottom:4px">’+e(q.cat)+’</span>’:””)+
‘<div style="margin-left:22px;margin-top:4px">’+rating(q.id,S.rat[q.id])+’</div></div>’;
}
app.innerHTML=’<div class="page"><div class="mx"><div class="card">’+prog(1)+
‘<p style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Step 2 of 3</p>’+
‘<h2 style="font-family:Georgia,serif;font-size:22px;color:#0f172a;margin-bottom:4px">Rate Your Experience</h2>’+
‘<p style="font-size:13px;color:#94a3b8;margin-bottom:20px">0 = worst · 10 = best</p>’+
(S.err.rat?’<div class="alert">’+e(S.err.rat)+’</div>’:””)+qh+
‘<div style="display:flex;justify-content:space-between;margin-top:8px">’+
‘<button class="btn bs2" id="bk">← Back</button>’+
‘<button class="btn bp" id="nx">Continue →</button>’+
‘</div></div></div></div>’;
$(“bk”).onclick=function(){S.view=“step1”;R()};
$(“nx”).onclick=function(){
var un=qs.filter(function(q){return S.rat[q.id]===undefined}).length;
if(un){S.err={rat:“Please rate all “+un+” remaining question(s)”};R();return}
S.err={};S.view=“step3”;R();
};bind();return;
}

if(v===“step3”){
var vals=Object.values(S.rat);var avg=vals.length?(vals.reduce(function(a,b){return a+b},0)/vals.length).toFixed(1):“0”;
app.innerHTML=’<div class="page"><div class="mx"><div class="card">’+prog(2)+
‘<p style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Step 3 of 3</p>’+
‘<h2 style="font-family:Georgia,serif;font-size:22px;color:#0f172a;margin-bottom:4px">Additional Comments</h2>’+
‘<p style="font-size:13px;color:#94a3b8;margin-bottom:16px">Anything else you'd like us to know? (Optional)</p>’+
‘<textarea id="ftx" rows="4" placeholder="Share any additional thoughts..." style="width:100%;padding:12px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:14px;resize:vertical;background:#f8fafc;line-height:1.6">’+e(S.ft)+’</textarea>’+
‘<div style="background:#f8fafc;border-radius:10px;padding:12px;margin-top:16px;border:1px solid #e2e8f0">’+
‘<p style="font-size:11px;font-weight:600;color:#475569;margin-bottom:4px">Review Summary</p>’+
‘<p style="font-size:13px;color:#64748b">’+e(S.fn)+’ ‘+e(S.sn)+’ · ‘+e(S.em)+’</p>’+
‘<p style="font-size:13px;color:#64748b;margin-top:2px">’+vals.length+’ questions · Avg: ‘+avg+’/10</p>’+
‘</div>’+
‘<div style="display:flex;justify-content:space-between;margin-top:20px">’+
‘<button class="btn bs2" id="bk">← Back</button>’+
‘<button class="btn bg" id="sub">Submit Feedback ✓</button>’+
‘</div></div></div></div>’;
$(“bk”).onclick=function(){S.view=“step2”;R()};
$(“sub”).onclick=function(){
S.ft=$(“ftx”).value;
subs.unshift({id:“s”+Date.now(),firstName:S.fn.trim(),surname:S.sn.trim(),email:S.em.trim(),ratings:JSON.parse(JSON.stringify(S.rat)),freeText:S.ft.trim(),ts:new Date().toISOString(),snap:qs.map(function(q){return{id:q.id,text:q.text,cat:q.cat}})});
ss();S.view=“thankyou”;R();
};bind();return;
}

if(v===“thankyou”){
app.innerHTML=’<div class="page"><div class="mx"><div class="card center" style="padding:44px 20px">’+
‘<div style="width:60px;height:60px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px">✓</div>’+
‘<h2 style="font-family:Georgia,serif;font-size:24px;color:#0f172a;margin-bottom:10px">Thank You!</h2>’+
‘<p style="color:#64748b;font-size:14px;max-width:340px;margin:0 auto 24px;line-height:1.6">’+e(st.ty)+’</p>’+
‘<button class="btn bp" id="dn">Done</button>’+
‘</div></div></div>’;
$(“dn”).onclick=function(){S.view=“landing”;R()};bind();return;
}

if(v===“admin”&&!S.auth){
app.innerHTML=’<div class="page"><div class="mx"><div class="card" style="max-width:380px;margin:0 auto">’+
‘<h2 style="font-family:Georgia,serif;font-size:20px;color:#0f172a;margin-bottom:16px;text-align:center">Admin Access</h2>’+
fld(“ap”,“Password”,“password”,“Enter admin password”,S.err.admin,S.ap)+
‘<div style="display:flex;gap:8px">’+
‘<button class="btn bs2" id="bk">← Back</button>’+
‘<button class="btn bp" id="li" style="flex:1">Sign In</button>’+
‘</div></div></div></div>’;
$(“bk”).onclick=function(){S.ap=””;S.err={};S.view=“landing”;R()};
$(“li”).onclick=function(){
S.ap=$(“ap”).value;
if(S.ap===st.pw){S.auth=true;S.ap=””;S.err={};S.sfT=st.title;S.sfS=st.subtitle;S.sfM=st.ty;S.sfP=st.pw}
else S.err={admin:“Incorrect password”};
R();
};bind();return;
}

if(v===“admin”&&S.auth){renderAdmin();bind();return}
}

function renderAdmin(){
var t=S.tab;
var tr=subs.length;
var ar=”—”;
if(tr>0){var sm=0;for(var i=0;i<subs.length;i++){var rv=Object.values(subs[i].ratings);sm+=rv.length?rv.reduce(function(a,b){return a+b},0)/rv.length:0}ar=(sm/tr).toFixed(1)}
var wk=subs.filter(function(s){return new Date(s.ts)>new Date(Date.now()-7*864e5)}).length;

var tabH=[[“dashboard”,“Dashboard”],[“questions”,“Questions”],[“submissions”,“Responses”],[“settings”,“Settings”]].map(function(x){return’<button class=“tab’+(t===x[0]?” on”:””)+’” data-tab=”’+x[0]+’”>’+x[1]+”</button>”}).join(””);

var ch=””;

if(t===“dashboard”){
var ph=””;
for(var i=0;i<qs.length;i++){var q=qs[i];var vl=subs.map(function(s){return s.ratings[q.id]}).filter(function(x){return x!==undefined});
var qa=vl.length?(vl.reduce(function(a,b){return a+b},0)/vl.length).toFixed(1):”—”;
var pc2=qa!==”—”?parseFloat(qa)/10*100:0;var clr=parseFloat(qa)>=7?”#10b981”:parseFloat(qa)>=4?”#f59e0b”:”#ef4444”;
ph+=’<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #f8fafc">’+
‘<div style="flex:1;min-width:0"><p style="font-size:12px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">’+e(q.text)+’</p><p style="font-size:10px;color:#94a3b8;margin-top:1px">’+vl.length+’ responses</p></div>’+
‘<div style="width:64px;height:5px;border-radius:3px;background:#f1f5f9;flex-shrink:0"><div style="width:'+pc2+'%;height:100%;border-radius:3px;background:'+clr+';transition:width .6s"></div></div>’+
‘<span style="font-size:13px;font-weight:700;color:#0f172a;min-width:28px;text-align:right">’+qa+’</span></div>’;
}
ch=’<div class="sg">’+
‘<div class="sc"><p style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">Responses</p><p style="font-size:26px;font-weight:700;color:#3b82f6">’+tr+’</p></div>’+
‘<div class="sc"><p style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">Avg Rating</p><p style="font-size:26px;font-weight:700;color:#10b981">’+ar+’</p></div>’+
‘<div class="sc"><p style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">Questions</p><p style="font-size:26px;font-weight:700;color:#8b5cf6">’+qs.length+’</p></div>’+
‘<div class="sc"><p style="font-size:10px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">This Week</p><p style="font-size:26px;font-weight:700;color:#f59e0b">’+wk+’</p></div>’+
‘</div>’+
‘<div style="background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)">’+
‘<h3 style="font-size:13px;font-weight:600;color:#0f172a;margin-bottom:12px">Question Performance</h3>’+(ph||’<p style="color:#94a3b8;font-size:13px">Add questions to see data.</p>’)+’</div>’;
}

if(t===“questions”){
var ql=””;
for(var i=0;i<qs.length;i++){var q=qs[i];
if(S.eqId===q.id){
ql+=’<div style=“padding:10px 0;’+(i<qs.length-1?“border-bottom:1px solid #f1f5f9”:””)+’”>’+
‘<input id="eqt" value="'+e(S.eqT)+'" style="width:100%;padding:8px 10px;border-radius:6px;border:2px solid #1e293b;font-size:13px;margin-bottom:6px">’+
‘<div style="display:flex;gap:6px"><input id="eqc" value="'+e(S.eqC)+'" style="flex:1;padding:8px 10px;border-radius:6px;border:2px solid #1e293b;font-size:13px">’+
‘<button class="btn bp bxs" id="svq">Save</button><button class="btn bs2 bxs" id="cnq">Cancel</button></div></div>’;
}else{
ql+=’<div style=“display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 0;’+(i<qs.length-1?“border-bottom:1px solid #f1f5f9”:””)+’”>’+
‘<span style="font-size:11px;font-weight:700;color:#cbd5e1;min-width:16px">’+(i+1)+’</span>’+
‘<span style="flex:1;font-size:13px;color:#334155;min-width:100px">’+e(q.text)+’</span>’+
‘<span style="font-size:10px;background:#f1f5f9;color:#64748b;padding:2px 7px;border-radius:4px">’+e(q.cat)+’</span>’+
‘<button style="background:none;border:none;font-size:12px;color:#64748b;padding:4px 6px" data-eq="'+q.id+'">Edit</button>’+
‘<button style="background:none;border:none;font-size:12px;color:#ef4444;padding:4px 6px" data-dq="'+q.id+'">Delete</button></div>’;
}
}
ch=’<div style="background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)">’+
‘<h3 style="font-size:13px;font-weight:600;color:#0f172a;margin-bottom:12px">Add New Question</h3>’+
‘<input id="nqt" placeholder="Question text..." value="'+e(S.nqT)+'" style="width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;margin-bottom:8px">’+
‘<div style="display:flex;gap:8px"><input id="nqc" placeholder="Category" value="'+e(S.nqC)+'" style="flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px">’+
‘<button class="btn bp bsm" id="aqb">+ Add</button></div></div>’+
